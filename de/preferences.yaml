    recommendations_heading: Empfehlungen
    microphone_label: Mikrofon
    refresh_microphones: Mikrofone aktualisieren
    runtime_heading: Laufzeitstatus
    runtime_copy: Der gepufferte Modus wartet auf die vollständige Äußerung, bevor dekodiert wird. Der Streaming-Modus zeigt während des Sprechens Teiltext an und führt beim Stoppen dennoch einen abschließenden Gesamtdurchlauf aus.
    loading: ASR-Einstellungen werden geladen...

    runtime:
      backend_runtime: Backend-Laufzeit
      kind: Laufzeittyp
