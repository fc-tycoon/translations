      storage_regenerate: 100 % entspricht der maximalen Qualität. Deaktivieren Sie die Speicherung im Spielstand, wenn Sie kleinere Spielstände möchten und akzeptieren, dass Porträts nach jedem Neuladen neu erzeugt werden.

