  asr:
    heading: Sprachdiktation
    copy: Die Sprachdiktation erfasst Audio von Ihrem Mikrofon und transkribiert es lokal auf Ihrem Rechner. Wählen Sie unten ein Sprachmodell, ein Beschleunigungsziel und einen Diktiermodus.
