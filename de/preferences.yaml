      compute_api: Compute-API
      device: Gerät
      worker_threads: Worker-Threads
      model_artifacts: Modellartefakte
      model_size: Installierte Modellgröße
      streaming_output: Streaming-Ausgabe

    preview:
      heading: Vorschau der Feldintegration
      copy: Diese Vorschau verwendet dieselbe feldbezogene Diktiersteuerung wie Texteingaben. Die Mikrofonaktion ist direkt im Rahmen des Textfelds eingebunden.
      placeholder: Hier tippen oder Mikrofonaudio zur Validierung des ASR-Transports aufnehmen...
      browser_capture: Browser-Aufnahme
      last_state: Letzter Diktierstatus
      audio_duration: Audiodauer
      encode_time: Kodierzeit
      decode_time: Dekodierzeit
      total_runtime: Gesamtlaufzeit
      text_tokens: Text-Token
      model_load: Modellladung

    hints:
      choose_acceleration: Wählen Sie das Rechenziel für die Transkription.
      choose_model: Wählen Sie das Sprachmodell für die Transkription.
      choose_mode: Wählen Sie, wie aufgenommenes Mikrofonaudio an das Backend gesendet werden soll.
      embedded_dll_only: Verwendet ausschließlich die eingebettete DLL-Laufzeit.
      device_npu: Der Intel-NPU-Modus verwendet OpenVINO und das systemseitig ausgewählte NPU-Gerät. Die aktuelle Bridge verlagert den Whisper-Encoder auf die NPU und belässt die Decoder-Arbeit auf der CPU.
      device_non_cuda: Die explizite GPU-Geräteauswahl gilt derzeit nur für CUDA. Vulkan und HIP verwenden das von whisper.cpp gemeldete Standard-GPU-Gerät der Laufzeit.
      device_no_cuda_devices: Der ASR-Laufzeit wurden derzeit keine CUDA-fähigen GPU-Geräte gemeldet.
      device_choose_cuda: Wählen Sie, welche erkannte CUDA-GPU ASR verwenden soll. Diese Auswahl gilt nur für ASR; Gesichtsgenerierung und LLM-Lasten bleiben separat konfiguriert.
      device_use_cuda: Verwendet {name} für CUDA-ASR. Diese Auswahl betrifft nur die Sprachdiktation; die GPU-Zuordnung für Gesichtsgenerierung und LLM wird nicht automatisch synchronisiert.
      npu_notice: Der Intel-NPU-Modus verwendet OpenVINO und das systemseitig ausgewählte NPU-Gerät. Es gibt noch keine Auswahl pro Gerät, und die Whisper-Decoder-Arbeit läuft in der aktuellen Bridge weiterhin auf der CPU.
      non_cuda_notice: Die aktuelle Whisper-Bridge verwendet für Vulkan und HIP die Standard-GPU der Laufzeit. Eine explizite Geräteauswahl pro GPU wird derzeit nur für CUDA unterstützt.
      no_selectable_cuda: Die eingebettete Laufzeit hat keine auswählbaren CUDA-Geräte gemeldet. ASR verwendet für dieses Beschleunigungsziel das Standardgerät der Laufzeit.
      single_cuda_device: 'Derzeit ist nur ein CUDA-fähiges ASR-Gerät verfügbar: {name}. Eine separate Auswahl ist nicht erforderlich.'
      multiple_cuda_devices: Mehrere CUDA-fähige ASR-Geräte sind verfügbar. Wählen Sie, welche physische GPU die Diktierfunktion verwenden soll.

    status:
      cpu: CPU
      default_gpu: die Standard-GPU
      final_pass_only: Nur Abschlusspass
      gpu_device: ASR-GPU-Gerät
      host_cpu: Host-CPU
      missing: Fehlt
      model_file_plural: '{count} Modelldateien'
      model_file_singular: '{count} Modelldatei'
      native_c: native-c
      no_model_files: Keine Modelldateien erkannt
      npu_device: ASR-NPU-Gerät
      present: Vorhanden
      ready: Bereit
      recommended_suffix: (Empfohlen)
      streaming_enabled: Live-Teiltexte aktiviert
      unavailable: Nicht verfügbar

    streaming:
      base: Alle {chunkMs} ms wird ein Audioblock transkribiert, während Sie sprechen.
      ultra_fast: Maximale Reaktionsgeschwindigkeit. Die Transkription läuft fast ohne Unterbrechung. Nur für schnelle Hardware mit einem Tiny- oder Base-Modell empfohlen. Rechnen Sie mit hoher CPU-Last.
      fast: Sehr reaktionsschnell. Funktioniert gut mit Tiny- und Base-Modellen. Geeignet für schnelle Tipper oder wenn besonders geringe Latenz wichtig ist.
      recommended: Empfohlener Mittelweg. Gute Balance zwischen Reaktionsgeschwindigkeit und CPU-Kosten. Teilaktualisierungen fühlen sich in diesem Intervall natürlich an.
      standard: Standard. Vorhersehbare Aktualisierungen ohne übermäßige CPU-Aktivität. Eine solide Wahl für jede Modellgröße.
      slow: Vorschau mit niedriger Frequenz. Weniger Aktualisierungen pro Äußerung und geringere CPU-Last. Der Text erscheint in größeren Blöcken statt Wort für Wort.

    recommendations:
      cpu_1: 'CPU-Inferenz: Beginnen Sie mit Tiny oder Tiny English. Base kann auf stärkeren CPUs funktionieren, Small ist aber meist besser für gepufferte Diktate reserviert.'
      cpu_2: 'CPU-Live-Vorschau: erst testen. Wenn Tipp- oder UI-Reaktionsgeschwindigkeit leidet, erhöhen Sie das Intervall auf 500-1000 ms, bevor Sie die Modellqualität verantwortlich machen.'
      cuda_1: CUDA ist derzeit der beste Weg für latenzarme Live-Vorschau und um Base- oder Small-Modelle zu nutzen, ohne dass sich die UI träge anfühlt.
      cuda_2: Wenn Sie mehrere NVIDIA-GPUs haben, legen Sie ASR nur dann auf die schwächere Karte, wenn die Hauptkarte bereits mit LLM- oder Facegen-Arbeit ausgelastet ist.
      openvino_1: Der Intel-NPU-Modus benötigt die passenden OpenVINO-Encoder-IR-Dateien für Ihr ausgewähltes Whisper-Modell. Das reine ggml-Modell allein reicht nicht aus.
      openvino_2: OpenVINO NPU lagert derzeit nur die Whisper-Encoder-Arbeit aus. Den größten Vorteil sehen Sie bei Base oder Small, nicht zwingend bei Tiny.
      other_gpu: Vulkan und HIP funktionieren am besten als einfache GPU-Beschleunigungsmodi. Die aktuelle Bridge nutzt für diese Backends die Standard-GPU der Laufzeit statt einer separaten Geräteauswahl.
      streaming_1: 'Live-Vorschau: Beginnen Sie bei etwa 300-500 ms. Wenn Sie flüssigere Teiltexte möchten, testen Sie 200 ms, behalten Sie das aber nur bei, wenn die UI auf Ihrem System reaktionsfähig bleibt.'
      streaming_2: Ihr aktuelles Intervall ist sehr aggressiv. Wenn die Vorschau stockt oder das Feld einfriert, verwenden Sie einen längeren Puffer, bevor Sie die Modellgröße ändern.
      buffered: Der gepufferte Modus ist weiterhin die sicherste Wahl, wenn Ihnen die Endgenauigkeit wichtiger ist als Text, der schon mitten im Satz erscheint.

