    preview:
      heading: Prévia de integração no campo
      copy: Isto usa o mesmo controle de ditado em nível de campo utilizado nas entradas de texto. A ação do microfone fica anexada diretamente dentro da moldura da área de texto.
      placeholder: Digite aqui ou capture áudio do microfone para validar o transporte ASR...
      browser_capture: Captura do navegador
      last_state: Último estado do ditado
      audio_duration: Duração do áudio
      encode_time: Tempo de codificação
      decode_time: Tempo de decodificação
      total_runtime: Tempo total de execução
      text_tokens: Tokens de texto
      model_load: Carregamento do modelo

    hints:
      choose_acceleration: Escolha o alvo de computação a usar na transcrição.
      choose_model: Escolha o modelo de voz a usar na transcrição.
      choose_mode: Escolha como o áudio capturado pelo microfone deve ser enviado ao backend.
      embedded_dll_only: Usa apenas o runtime DLL incorporado.
      device_npu: O modo Intel NPU usa OpenVINO e aponta para o dispositivo NPU selecionado pelo sistema. A ponte atual descarrega o codificador Whisper para a NPU e mantém o trabalho do decodificador na CPU.
      device_non_cuda: A seleção explícita de dispositivo GPU atualmente se aplica apenas ao CUDA. Vulkan e HIP usam o dispositivo GPU padrão do runtime exposto pelo whisper.cpp.
      device_no_cuda_devices: O runtime ASR não expõe no momento nenhum dispositivo GPU compatível com CUDA.
      device_choose_cuda: Escolha qual GPU CUDA detectada o ASR deve usar. Este seletor vale apenas para o ASR; geração facial e cargas de LLM continuam configuradas separadamente.
      device_use_cuda: Usa {name} para o ASR com CUDA. Este seletor afeta apenas o ditado por voz; a alocação de GPU da geração facial e do LLM não é sincronizada automaticamente.
      npu_notice: O modo Intel NPU usa OpenVINO e o dispositivo NPU selecionado pelo sistema. Ainda não existe um seletor por dispositivo, e o trabalho do decodificador Whisper continua sendo executado na CPU na ponte atual.
      non_cuda_notice: A ponte Whisper atual usa a GPU padrão do runtime para Vulkan e HIP. A seleção explícita por dispositivo só é suportada para CUDA neste momento.
      no_selectable_cuda: O runtime incorporado não informou nenhum dispositivo CUDA selecionável. O ASR usará o dispositivo padrão do runtime para este alvo de aceleração.
      single_cuda_device: 'Atualmente só há um dispositivo ASR compatível com CUDA exposto: {name}. Um seletor separado é desnecessário.'
      multiple_cuda_devices: Há vários dispositivos ASR compatíveis com CUDA disponíveis. Escolha qual GPU física o ditado deve usar.

    status:
      cpu: CPU
      default_gpu: a GPU padrão
      final_pass_only: Apenas passe final
      gpu_device: Dispositivo GPU do ASR
      host_cpu: CPU do host
      missing: Ausente
      model_file_plural: '{count} arquivos de modelo'
      model_file_singular: '{count} arquivo de modelo'
      native_c: native-c
      no_model_files: Nenhum arquivo de modelo detectado
      npu_device: Dispositivo NPU do ASR
      present: Presente
      ready: Pronto
      recommended_suffix: (Recomendado)
      streaming_enabled: Parciais ao vivo ativados
      unavailable: Indisponível

    streaming:
      base: Um segmento de áudio é transcrito a cada {chunkMs} ms enquanto você fala.
      ultra_fast: Máxima responsividade. A transcrição roda quase continuamente. Só é recomendada em hardware rápido com um modelo Tiny ou Base. Espere alta carga de CPU.
      fast: Muito responsivo. Funciona bem com modelos Tiny e Base. Adequado para digitadores rápidos ou para quem precisa de feedback de baixa latência.
      recommended: Ponto ideal recomendado. Equilíbrio entre responsividade e custo de CPU. As atualizações parciais parecem naturais nesse intervalo.
      standard: Padrão. Atualizações previsíveis sem atividade excessiva de CPU. Uma escolha sólida para qualquer tamanho de modelo.
      slow: Prévia de baixa frequência. Menos atualizações por fala e menor carga de CPU. O texto aparece em blocos maiores, em vez de palavra por palavra.

    recommendations:
      cpu_1: Inferência em CPU: comece com Tiny ou Tiny English. Base pode funcionar em CPUs mais fortes, mas Small normalmente é mais adequado ao ditado em buffer.
      cpu_2: Prévia ao vivo em CPU: teste primeiro. Se a digitação ou a responsividade da IU piorarem, aumente o intervalo para 500-1000 ms antes de culpar a qualidade do modelo.
      cuda_1: CUDA é atualmente o melhor caminho para prévia ao vivo com baixa latência e para executar modelos Base ou Small sem deixar a IU pesada.
      cuda_2: Se você tiver várias GPUs NVIDIA, deixe o ASR na placa mais leve apenas se a placa principal estiver ocupada com trabalho de LLM ou facegen.
      openvino_1: O modo Intel NPU exige os arquivos IR do codificador OpenVINO correspondentes ao modelo Whisper selecionado. O modelo ggml simples, sozinho, não basta.
      openvino_2: O OpenVINO NPU atualmente descarrega apenas o trabalho do codificador Whisper. O maior benefício costuma aparecer em Base ou Small, não necessariamente em Tiny.
      other_gpu: Vulkan e HIP funcionam melhor como modos simples de aceleração por GPU. A ponte atual usa a GPU padrão do runtime, e não um seletor por dispositivo, para esses backends.
      streaming_1: Prévia ao vivo: comece em torno de 300-500 ms. Se quiser parciais mais suaves, teste 200 ms, mas só mantenha isso se a IU continuar responsiva na sua máquina.
      streaming_2: O intervalo atual é muito agressivo. Se a prévia travar ou o campo congelar, use um buffer maior antes de mudar o tamanho do modelo.
      buffered: O modo em buffer continua sendo a opção mais segura quando a precisão final importa mais do que ver o texto surgir no meio da frase.

