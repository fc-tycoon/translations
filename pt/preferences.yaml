      persist_enabled: Os retratos são gravados no banco de dados do save e reutilizados após recarregar.
      storage_quality: Uma qualidade JPEG mais alta melhora a fidelidade, mas aumenta o tamanho dos retratos quando eles são armazenados no save.
      storage_regenerate: 100% é Qualidade Máxima. Desative o armazenamento no save se quiser saves menores e puder aceitar que os retratos sejam regenerados após cada recarga.

