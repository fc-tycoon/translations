    refresh_microphones: Atualizar microfones
    runtime_heading: Estado do runtime
    runtime_copy: O modo em buffer espera a fala completa antes de decodificar. O modo em streaming mostra texto parcial enquanto você fala e ainda executa um passe final completo quando a gravação é interrompida.
