      notes:
        player_sacking: Percentage chance of YOU getting sacked. Lower than 100% reduces sacking frequency. 0% disables sacking for you.
        npc_sacking: Percentage chance of AI/NPC (Non-player) managers being sacked. Lower than 100% reduces sacking frequency.
        training_injuries: Percentage chance of injuries during training. Lower than 100% reduces training injuries. 0% disables training injuries.
        match_injuries: Percentage chance of injuries during matches. Lower than 100% reduces match injuries. 0% disables match injuries.
        long_term_injuries: Injuries over 2 months have a reduced chance of occurring. 50% gives a 1/2 chance the injury will be capped to 2 months. 0% will cap maximum injury duration to 2 months.
        travel_costs: Multiplier applied to travel-related costs. Lower than 100% reduces travel costs. 0% disables travel costs.

