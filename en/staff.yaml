      abbr: MH
      desc: Working with press, handling interviews, and staying on-message
    social_media:
      label: Social Media
      abbr: SoM
      desc: Managing digital platform presence and audience engagement
    marketing:
      label: Marketing
      abbr: Mkt
      desc: Commercial, sponsorship, and brand strategy understanding
    business_acumen:
      label: Business Acumen
      abbr: BA
      desc: Commercial decision-making, financial intelligence, and strategic judgment

    # ── Facilities & Operations ───────────────────────────────────
    facilities_management:
      label: Facilities Mgmt
      abbr: FM
      desc: Day-to-day facility upkeep, maintenance quality, and cost control
    construction_management:
