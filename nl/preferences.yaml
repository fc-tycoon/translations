      copy: Dit gebruikt dezelfde veldgebonden dictatiefunctie als tekstinvoer. De microfoonactie zit direct in het kader van het tekstvak.
      placeholder: Typ hier of neem microfoonaudio op om het ASR-transport te valideren...
      browser_capture: Browseropname
      last_state: Laatste dictatiestatus
      audio_duration: Audioduur
      encode_time: Codeertijd
      decode_time: Decodeertijd
