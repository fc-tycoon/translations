      model_load: Modellading

    hints:
      choose_acceleration: Kies het rekendoel voor transcriptie.
      choose_model: Kies het stemmodel voor transcriptie.
      choose_mode: Kies hoe opgenomen microfoonaudio naar de backend moet worden gestuurd.
      embedded_dll_only: Gebruikt alleen de ingebouwde DLL-runtime.
      device_npu: De Intel-NPU-modus gebruikt OpenVINO en richt zich op het door het systeem gekozen NPU-apparaat. De huidige bridge verplaatst de Whisper-encoder naar de NPU en laat het decoderwerk op de CPU.
      device_non_cuda: Expliciete selectie van GPU-apparaten geldt momenteel alleen voor CUDA. Vulkan gebruikt het standaard GPU-apparaat van de runtime dat door whisper.cpp wordt blootgesteld.
      device_no_cuda_devices: Er zijn momenteel geen CUDA-geschikte GPU-apparaten beschikbaar in de ASR-runtime.
      device_choose_cuda: Kies welke gedetecteerde CUDA-GPU ASR moet gebruiken. Deze selector geldt alleen voor ASR; gezichtsgeneratie en LLM-belasting blijven apart geconfigureerd.
      device_use_cuda: Gebruikt {name} voor CUDA-ASR. Deze selector heeft alleen invloed op spraakdictatie; GPU-toewijzing voor gezichtsgeneratie en LLM wordt niet automatisch gesynchroniseerd.
      npu_notice: De Intel-NPU-modus gebruikt OpenVINO en het door het systeem gekozen NPU-apparaat. Er is nog geen apparaatkiezer per apparaat, en Whisper-decoderwerk draait in de huidige bridge nog steeds op de CPU.
      non_cuda_notice: De huidige Whisper-bridge gebruikt voor Vulkan de standaard-GPU van de runtime. Expliciete apparaatsselectie wordt op dit moment alleen voor CUDA ondersteund.
      no_selectable_cuda: De ingebouwde runtime meldde geen selecteerbare CUDA-apparaten. ASR gebruikt voor dit versnellingsdoel het standaardapparaat van de runtime.
      single_cuda_device: 'Er is momenteel maar één CUDA-geschikt ASR-apparaat beschikbaar: {name}. Een aparte kiezer is niet nodig.'
      multiple_cuda_devices: Er zijn meerdere CUDA-geschikte ASR-apparaten beschikbaar. Kies welke fysieke GPU voor dictatie gebruikt moet worden.

    status:
      cpu: CPU
      default_gpu: de standaard-GPU
      final_pass_only: Alleen eindpass
      gpu_device: ASR-GPU-apparaat
      host_cpu: Host-CPU
      missing: Ontbreekt
      model_file_plural: '{count} modelbestanden'
      model_file_singular: '{count} modelbestand'
      native_c: native-c
      no_model_files: Geen modelbestanden gedetecteerd
      npu_device: ASR-NPU-apparaat
      present: Aanwezig
      ready: Gereed
      recommended_suffix: (Aanbevolen)
      streaming_enabled: Live deelresultaten ingeschakeld
      unavailable: Niet beschikbaar

    streaming:
      base: Elke {chunkMs} ms wordt een audiodeel getranscribeerd terwijl je spreekt.
      ultra_fast: Maximale responsiviteit. Transcriptie draait bijna continu. Alleen aanbevolen op snelle hardware met een Tiny- of Base-model. Verwacht hoge CPU-belasting.
      fast: Zeer responsief. Werkt goed met Tiny- en Base-modellen. Geschikt voor snelle typisten of wanneer feedback met lage latentie belangrijk is.
      recommended: Aanbevolen middenweg. Goede balans tussen responsiviteit en CPU-kosten. Gedeeltelijke updates voelen bij dit interval natuurlijk aan.
      standard: Standaard. Voorspelbare updates zonder overmatige CPU-activiteit. Een solide keuze voor elke modelgrootte.
      slow: Voorbeeld met lage frequentie. Minder updates per uitspraak en minder CPU-belasting. Tekst verschijnt in grotere blokken in plaats van woord voor woord.

    recommendations:
      cpu_1: 'CPU-inferentie: begin met Tiny of Tiny English. Base kan op sterkere CPU''s werken, maar Small is meestal beter voor gebufferde dictatie.'
      cpu_2: 'CPU-livevoorbeeld: test het eerst. Als typen of UI-responsiviteit achteruitgaat, verhoog het interval dan naar 500-1000 ms voordat je de modelkwaliteit de schuld geeft.'
      cuda_1: CUDA is momenteel de beste route voor livevoorbeeld met lage latentie en voor het draaien van Base- of Small-modellen zonder dat de UI traag aanvoelt.
      cuda_2: Als je meerdere NVIDIA-GPU's hebt, zet ASR alleen op de lichtere kaart als de hoofdkaart al druk is met LLM- of facegen-werk.
      openvino_1: De Intel-NPU-modus vereist de bijpassende OpenVINO-encoder-IR-bestanden voor je gekozen Whisper-model. Alleen het gewone ggml-model is niet genoeg.
      openvino_2: OpenVINO NPU offloadt momenteel alleen Whisper-encoderwerk. Het grootste voordeel zie je meestal bij Base of Small, niet per se bij Tiny.
      other_gpu: Vulkan werkt het best als eenvoudige GPU-versnellingsmodus. De huidige bridge gebruikt voor deze backend de standaard-GPU van de runtime in plaats van een apparaatskiezer.
      streaming_1: 'Livevoorbeeld: begin rond 300-500 ms. Als je vloeiendere deelresultaten wilt, kun je 200 ms testen, maar houd dat alleen aan als de UI op jouw machine responsief blijft.'
      streaming_2: Je huidige interval is erg agressief. Als het voorbeeld hapert of het veld vastloopt, gebruik dan eerst een langere buffer voordat je de modelgrootte verandert.
      buffered: De gebufferde modus is nog steeds de veiligste keuze als je meer geeft om uiteindelijke nauwkeurigheid dan om tekst die halverwege een zin al verschijnt.

