    model_label: Modelo de voz
    mode_label: Modo de dictado
    preview_interval_label: Intervalo de vista previa en vivo
    recommendations_heading: Recomendaciones
    microphone_label: Micrófono
    refresh_microphones: Actualizar micrófonos
    runtime_heading: Estado del runtime
    runtime_copy: El modo en búfer espera la frase completa antes de decodificar. El modo en streaming muestra texto parcial mientras hablas y aun así ejecuta una pasada final completa al detener la grabación.
    loading: Cargando preferencias de ASR...

    runtime:
      backend_runtime: Runtime del backend
      kind: Tipo de runtime
      artifact: Artefacto del runtime
      selected_model_artifact: Artefacto del modelo seleccionado
      execution_backend: Backend de ejecución
      requested_target: Objetivo solicitado
      compute_api: API de cómputo
      device: Dispositivo
      worker_threads: Hilos de trabajo
      model_artifacts: Artefactos del modelo
      model_size: Tamaño del modelo instalado
      streaming_output: Salida en streaming

    preview:
      heading: Vista previa de integración en campos
      copy: Esto usa el mismo control de dictado a nivel de campo que se utiliza en las entradas de texto. La acción del micrófono está conectada directamente dentro del marco del área de texto.
      placeholder: Escribe aquí o captura audio del micrófono para validar el transporte ASR...
      browser_capture: Captura del navegador
      last_state: Último estado del dictado
      audio_duration: Duración del audio
      encode_time: Tiempo de codificación
      decode_time: Tiempo de decodificación
      total_runtime: Tiempo total de ejecución
      text_tokens: Tokens de texto
      model_load: Carga del modelo

    hints:
      choose_acceleration: Elige el objetivo de cómputo que se usará para la transcripción.
      choose_model: Elige el modelo de voz que se usará para la transcripción.
      choose_mode: Elige cómo debe enviarse al backend el audio capturado por el micrófono.
      embedded_dll_only: Usa solo el runtime DLL integrado.
      device_npu: El modo Intel NPU usa OpenVINO y apunta al dispositivo NPU seleccionado por el sistema. El puente actual descarga el codificador Whisper en la NPU y mantiene el trabajo del decodificador en la CPU.
      device_non_cuda: La selección explícita de dispositivos GPU actualmente solo se aplica a CUDA. Vulkan usa la GPU predeterminada del runtime expuesta por whisper.cpp.
      device_no_cuda_devices: El runtime de ASR no expone actualmente ninguna GPU compatible con CUDA.
      device_choose_cuda: Elige qué GPU CUDA detectada debe usar ASR. Este selector solo afecta a ASR; la generación facial y las cargas de LLM siguen configurándose por separado.
      device_use_cuda: Usa {name} para el trabajo ASR con CUDA. Este selector solo afecta al dictado por voz; la asignación de GPU para generación facial y LLM no se sincroniza automáticamente.
      npu_notice: El modo Intel NPU usa OpenVINO y el dispositivo NPU seleccionado por el sistema. Todavía no hay selector por dispositivo, y el trabajo del decodificador Whisper sigue ejecutándose en la CPU en el puente actual.
      non_cuda_notice: El puente actual de Whisper usa la GPU predeterminada del runtime para Vulkan. La selección explícita por dispositivo solo está disponible para CUDA por ahora.
      no_selectable_cuda: El runtime integrado no informó de ningún dispositivo CUDA seleccionable. ASR usará el dispositivo predeterminado del runtime para este objetivo de aceleración.
      single_cuda_device: 'Solo hay un dispositivo ASR compatible con CUDA expuesto actualmente: {name}. No hace falta un selector aparte.'
      multiple_cuda_devices: Hay varios dispositivos ASR compatibles con CUDA disponibles. Elige qué GPU física debe usar el dictado.

    status:
      cpu: CPU
      default_gpu: la GPU predeterminada
      final_pass_only: Solo pasada final
      gpu_device: Dispositivo GPU de ASR
      host_cpu: CPU del host
      missing: Falta
      model_file_plural: '{count} archivos de modelo'
      model_file_singular: '{count} archivo de modelo'
      native_c: native-c
      no_model_files: No se detectaron archivos de modelo
      npu_device: Dispositivo NPU de ASR
      present: Presente
      ready: Listo
      recommended_suffix: (Recomendado)
      streaming_enabled: Parciales en vivo activados
      unavailable: No disponible

    streaming:
      base: Se transcribe un fragmento de audio cada {chunkMs} ms mientras hablas.
      ultra_fast: Máxima capacidad de respuesta. La transcripción se ejecuta casi de forma continua. Solo se recomienda en hardware rápido con un modelo Tiny o Base. Espera una carga alta de CPU.
      fast: Muy sensible. Funciona bien con modelos Tiny y Base. Adecuado para mecanógrafos rápidos o para quienes necesitan retroalimentación de baja latencia.
      recommended: Punto ideal recomendado. Equilibrio entre capacidad de respuesta y coste de CPU. Las actualizaciones parciales se sienten naturales con este intervalo.
      standard: Estándar. Actualizaciones previsibles sin actividad excesiva de CPU. Una opción sólida para cualquier tamaño de modelo.
      slow: Vista previa de baja frecuencia. Menos actualizaciones por frase y menor carga de CPU. El texto aparece en bloques más grandes en lugar de palabra por palabra.

    recommendations:
      cpu_1: 'Inferencia en CPU: empieza con Tiny o Tiny English. Base puede funcionar en CPUs más potentes, pero Small suele reservarse mejor para dictado en búfer.'
      cpu_2: 'Vista previa en vivo por CPU: pruébala primero. Si la escritura o la respuesta de la UI se degradan, aumenta el intervalo a 500-1000 ms antes de culpar a la calidad del modelo.'
      cuda_1: CUDA es actualmente la mejor opción para una vista previa en vivo con baja latencia y para ejecutar modelos Base o Small sin que la UI se sienta lenta.
      cuda_2: Si tienes varias GPU NVIDIA, deja ASR en la tarjeta más ligera solo si la principal está ocupada con trabajo de LLM o facegen.
      openvino_1: El modo Intel NPU requiere los archivos IR del codificador OpenVINO correspondientes al modelo Whisper seleccionado. El modelo ggml por sí solo no basta.
      openvino_2: OpenVINO NPU actualmente solo descarga el trabajo del codificador Whisper. El mayor beneficio suele verse con Base o Small, no necesariamente con Tiny.
      other_gpu: Vulkan funciona mejor como un modo sencillo de aceleración por GPU. El puente actual usa la GPU predeterminada del runtime en lugar de un selector por dispositivo para este backend.
      streaming_1: 'Vista previa en vivo: empieza alrededor de 300-500 ms. Si quieres parciales más suaves, prueba 200 ms, pero mantenlo solo si la UI sigue respondiendo bien en tu máquina.'
      streaming_2: Tu intervalo actual es muy agresivo. Si la vista previa se atasca o el campo se congela, usa un búfer más largo antes de cambiar el tamaño del modelo.
      buffered: El modo en búfer sigue siendo la opción más segura cuando te importa más la precisión final que ver texto aparecer a mitad de frase.

