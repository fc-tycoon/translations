      detected_adapters: 'Adaptadores detectados: {adapters}.'
      detected_gpu: 'GPU detectada: {adapter}. VRAM detectada: {vram}.'
      detection_unavailable: La detección de VRAM de la GPU no estuvo disponible en este sistema. La generación facial seguirá ejecutándose con el runtime compartido.
      persist_disabled: Los retratos permanecen en memoria solo durante la sesión actual y se regeneran tras volver a cargar.
      persist_enabled: Los retratos se escriben en la base de datos de la partida y se reutilizan después de volver a cargar.
      storage_quality: Una calidad JPEG más alta mejora la fidelidad, pero aumenta el tamaño de los retratos cuando se almacenan en la partida.
      storage_regenerate: El 100 % es calidad máxima. Desactiva el almacenamiento en la partida si quieres partidas más pequeñas y aceptas que los retratos se regeneren después de cada recarga.

    quality:
