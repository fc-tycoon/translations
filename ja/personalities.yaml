
# ══════════════════════════════════════════════════════════════════════
# 個性テンプレート
# ══════════════════════════════════════════════════════════════════════
personalities:
  pragmatic_winner:
    label: 実用主義の勝者
    text: タイトルへの飽くなき欲求を持つ実用主義者。規律と戦術的革新を通じてチームを構築することを信条とする。
  youth_developer:
    label: 育成型コーチ
    text: 長期的な育成を重視する忍耐強いメンター。高額補強よりも若い才能を育てることを好む。
  defensive_mastermind:
    label: 守備の天才
    text: 守備組織に並々ならぬ執念を持つ几帳面な組織者。失点は個人的な失敗と受け止める。
  attacking_idealist:
    label: 攻撃的理想主義者
    text: 表現力豊かな攻撃フットボールを要求する。1-0で勝つより4-3で負けることを厭わない。
  old_school_disciplinarian:
    label: 旧来の厳格主義者
    text: 完全な献身を求める頑固な伝統主義者。基準は絶対に譲れない。
  media_darling:
    label: メディアの寵児
    text: スポットライトの中で輝くカリスマ的なタッチライン上の存在。記者会見を武器として活用する。
  silent_operator:
    label: 沈黙の実行者
    text: 静かで冷静、そして非常にプライベートな人物。結果で語り、ドラマを避ける。
  tactical_innovator:
    label: 戦術的革新者
    text: フォーメーションとシステムを絶えず調整する飽くなき思考者。常に次なる優位を模索している。
  assistant_loyal_lieutenant:
    label: 忠実な副官
    text: 監督のメッセージを公の場で守り、裏でも徹底して支える非常に忠実な補佐役。ロッカールームを指揮官と同じ方向に保ち、権威を決して損なわない。
  assistant_tactical_brain:
    label: 戦術参謀
    text: 大きな方針を練習メニューの細部、相手対策、試合中の的確な修正へ落とし込める鋭い思考の持ち主。パターンを素早く見抜き、雑音ではなく有益な答えを監督に返す。
  assistant_training_ground_general:
    label: トレーニング場の統率者
    text: 構造、強度、徹底力でトレーニングの空気を作る。試合日だけでなく毎日の基準を高く保ち続ける。
  assistant_player_whisperer:
    label: 選手対応の達人
    text: 選手の感情の揺れを早く察知し、難しい会話も落ち着いた権威でまとめる。選手に耳を傾けつつ、スタッフの基準からは決してぶれない。
  assistant_development_specialist:
    label: 育成スペシャリスト
    text: 個々の成長、役割の明確さ、長期的な改善に強くこだわる。若手や控え選手に具体的な次の一歩を示すことに特に長けている。
  assistant_standards_enforcer:
    label: 基準の徹底者
    text: あらゆる日課に時間厳守、プロ意識、一貫性を求める。結果が揺らいでも環境を引き締め、慢心を許さない。
  assistant_opposition_analyst:
    label: 相手分析官
    text: 試合映像、レポート、マッチアップの細部に没頭するタイプ。次の相手をどこで圧迫し、どこを守り、どこを突くべきかを明確に整理して持ち込む。
  assistant_calm_conduit:
    label: 冷静な伝達役
    text: 不調、過密日程、メディアの騒音の中でもスタッフと選手を落ち着かせる安定したコミュニケーター。上下への伝達を摩擦なく行うのが得意。
  assistant_culture_keeper:
    label: 文化の守り手
    text: クラブの価値観を体現し、職場の空気を守る。新加入選手、下部組織の選手、出番の少ない選手に期待値を素早く理解させる。
