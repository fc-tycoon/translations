  asr:
    heading: 音声ディクテーション
    copy: 音声ディクテーションはマイクの音声を取得し、ローカル環境で文字起こしします。以下で音声モデル、アクセラレーション先、ディクテーションモードを選択してください。
    acceleration_label: アクセラレーション先
    model_label: 音声モデル
    mode_label: ディクテーションモード
    preview_interval_label: ライブプレビュー間隔
    recommendations_heading: 推奨設定
    microphone_label: マイク
    refresh_microphones: マイクを更新
    runtime_heading: ランタイム状態
    runtime_copy: バッファリングモードは発話全体を待ってからデコードします。ストリーミングモードは話している間に部分的な文字列を表示し、停止時に最終パスも実行します。
    loading: ASR 設定を読み込み中...

    runtime:
      backend_runtime: バックエンドランタイム
      kind: ランタイム種別
      artifact: ランタイムアーティファクト
      selected_model_artifact: 選択中のモデルアーティファクト
      execution_backend: 実行バックエンド
      requested_target: 要求ターゲット
      compute_api: 計算 API
      device: デバイス
      worker_threads: ワーカースレッド
      model_artifacts: モデルアーティファクト
      model_size: インストール済みモデルサイズ
      streaming_output: ストリーミング出力

    preview:
      heading: フィールド統合プレビュー
      copy: このプレビューでは、テキスト入力と同じフィールド単位のディクテーション操作を使用します。マイク操作はテキストエリアの枠内に直接組み込まれています。
      placeholder: ここに入力するか、ASR 転送の検証用にマイク音声を取得してください...
      browser_capture: ブラウザー録音
      last_state: 前回のディクテーション状態
      audio_duration: 音声時間
      encode_time: エンコード時間
      decode_time: デコード時間
      total_runtime: 合計実行時間
      text_tokens: テキストトークン
      model_load: モデル読み込み

    hints:
      choose_acceleration: 文字起こしに使用する計算ターゲットを選択してください。
      choose_model: 文字起こしに使用する音声モデルを選択してください。
      choose_mode: 収録したマイク音声をどのようにバックエンドへ送るかを選択してください。
      embedded_dll_only: 組み込み DLL ランタイムのみを使用します。
      device_npu: Intel NPU モードは OpenVINO を使用し、システムで選択された NPU デバイスを対象にします。現在のブリッジでは Whisper エンコーダーを NPU にオフロードし、デコーダー処理は CPU に残します。
      device_non_cuda: 明示的な GPU デバイス選択は現在 CUDA のみ対応しています。Vulkan は whisper.cpp が公開するランタイム既定の GPU を使用します。
      device_no_cuda_devices: ASR ランタイムから利用可能な CUDA 対応 GPU デバイスは現在公開されていません。
      device_choose_cuda: ASR で使用する検出済み CUDA GPU を選択します。この選択は ASR 専用で、顔生成や LLM の負荷設定とは個別です。
      device_use_cuda: CUDA ASR に {name} を使用します。この選択は音声ディクテーションのみに影響し、顔生成や LLM の GPU 配置とは自動同期されません。
      npu_notice: Intel NPU モードは OpenVINO とシステム選択の NPU デバイスを使用します。まだデバイスごとの選択機能はなく、現在のブリッジでは Whisper デコーダー処理は引き続き CPU 上で動作します。
      non_cuda_notice: 現在の Whisper ブリッジは Vulkan でランタイム既定の GPU を使用します。明示的なデバイス選択は現時点では CUDA のみ対応しています。
      no_selectable_cuda: 組み込みランタイムは選択可能な CUDA デバイスを報告しませんでした。ASR はこの加速ターゲットでランタイム既定のデバイスを使用します。
      single_cuda_device: '現在公開されている CUDA 対応 ASR デバイスは {name} のみです。個別の選択は不要です。'
      multiple_cuda_devices: 複数の CUDA 対応 ASR デバイスが利用可能です。ディクテーションで使用する物理 GPU を選択してください。

    status:
      cpu: CPU
      default_gpu: 既定の GPU
      final_pass_only: 最終パスのみ
      gpu_device: ASR GPU デバイス
      host_cpu: ホスト CPU
      missing: 未検出
      model_file_plural: '{count} 個のモデルファイル'
      model_file_singular: '{count} 個のモデルファイル'
      native_c: native-c
      no_model_files: モデルファイルが見つかりません
      npu_device: ASR NPU デバイス
      present: あり
      ready: 準備完了
      recommended_suffix: (推奨)
      streaming_enabled: ライブ部分結果を有効化
      unavailable: 利用不可

    streaming:
      base: 話している間、{chunkMs} ms ごとに音声の一部を文字起こしします。
      ultra_fast: 応答性を最優先します。文字起こしはほぼ連続的に実行されます。高速なハードウェアで Tiny または Base モデルを使う場合にのみ推奨です。CPU 負荷は高くなります。
      fast: 非常に高応答です。Tiny と Base モデルで良好に動作します。高速タイピングや低遅延のフィードバックが必要な場合に向いています。
      recommended: 推奨のバランス設定です。応答性と CPU コストの釣り合いがよく、この間隔では部分更新が自然に感じられます。
      standard: 標準。CPU を使い過ぎず、予測しやすい更新頻度です。どのモデルサイズにも無難な選択です。
      slow: 低頻度プレビュー。発話ごとの更新回数が少なく、CPU 負荷も低くなります。テキストは単語ごとではなく大きめの塊で表示されます。

    recommendations:
      cpu_1: CPU 推論では Tiny または Tiny English から始めてください。Base は強めの CPU なら使えますが、Small は通常バッファードディクテーション向きです。
      cpu_2: CPU のライブプレビューはまず試して確認してください。入力や UI の応答性が落ちるなら、モデル品質を疑う前に間隔を 500-1000 ms に広げてください。
      cuda_1: 低遅延のライブプレビューや、UI を重くしすぎずに Base または Small を使うには、現状では CUDA が最良の選択です。
      cuda_2: NVIDIA GPU が複数ある場合、メインのカードが LLM や facegen で忙しいときだけ ASR を軽いカードに割り当ててください。
      openvino_1: Intel NPU モードでは、選択した Whisper モデルに対応する OpenVINO エンコーダー IR ファイルが必要です。ggml モデルだけでは不十分です。
      openvino_2: OpenVINO NPU が現在オフロードするのは Whisper エンコーダー処理のみです。効果が大きいのは Tiny より Base や Small のことが多いです。
      other_gpu: Vulkan は単純な GPU アクセラレーションモードとして使うのが最適です。現在のブリッジでは、このバックエンドに対して個別のデバイス選択ではなくランタイム既定 GPU を使用します。
      streaming_1: ライブプレビューは 300-500 ms 前後から始めてください。より滑らかな部分結果が欲しい場合は 200 ms を試せますが、UI の応答性が維持できるときだけ採用してください。
      streaming_2: 現在の間隔はかなり攻めています。プレビューが止まったりフィールドが固まる場合は、モデルサイズを変える前にバッファを長めにしてください。
      buffered: 文の途中で文字が出ることより最終精度を重視するなら、バッファリングモードが依然として最も安全です。

