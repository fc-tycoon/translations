multi_instance:
  window_title: 別のインスタンスを検出
  heading: 別の FC Tycoon ゲームまたはエディターのインスタンスがすでに実行中です。
  intro: 複数のインスタンスを同時に実行すると、同じ設定ファイルを共有し、同じデータベースまたはセーブファイルを対象にする可能性があります。変更は実行中のインスタンス間で同期されません。
  instructions: 別のインスタンスを続行する前に、以下の各項目を確認してください。
  config_path_label: 共有設定ディレクトリ
  data_path_label: 関連するデータベースまたはセーブのパス
  path_unavailable: 利用できません
  preferences_ack: 設定や構成の変更は、もう一方の実行中インスタンスが再読み込みまたは再起動するまで反映されないことを理解しています。
  database_ack: データベースまたはセーブの変更によって、もう一方のインスタンスの作業が上書きされる可能性があり、その変更は相手がデータベースを再読み込みまたは再起動するまで表示されないことを理解しています。
  final_ack: これらの条件に同意し、別のインスタンスの実行を続行します。
  continue: 続行
  exit: 終了