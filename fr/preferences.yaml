  facegen:
    heading: Génération de visages
    copy: La génération de visages passe par un runtime partagé pour tout le processus. La mise en file d'attente et la priorité sont gérées automatiquement.
    backend_label: Backend d'inférence
    quality_label: Qualité JPEG du portrait
    persist_heading: Stocker les portraits dans la sauvegarde
    storage_heading: Stockage des portraits
    loading: Chargement des préférences Facegen...

    hints:
      choose_backend: Choisissez quelle DLL de runtime Facegen spécifique au backend doit être utilisée pour générer les portraits.

    status:
      unknown_adapter: Adaptateur inconnu

    notes:
      current_setting: 'Réglage actuel : {quality}% - {label}.'
      detected_adapters: 'Adaptateurs détectés : {adapters}.'
      detected_gpu: 'GPU détecté : {adapter}. VRAM détectée : {vram}.'
      detection_unavailable: La détection de la VRAM GPU n'était pas disponible sur ce système. La génération de visages fonctionnera tout de même avec le runtime partagé.
      persist_disabled: Les portraits restent en mémoire uniquement pendant la session en cours et sont régénérés après rechargement.
      persist_enabled: Les portraits sont écrits dans la base de données de la sauvegarde et réutilisés après rechargement.
      storage_quality: Une qualité JPEG plus élevée améliore la fidélité, mais augmente la taille des portraits lorsqu'ils sont stockés dans la sauvegarde.
      storage_regenerate: 100 % correspond à la qualité maximale. Désactivez le stockage dans la sauvegarde si vous voulez des sauvegardes plus petites et acceptez que les portraits soient régénérés après chaque rechargement.

    quality:
      compact: Qualité compacte
      high: Haute qualité
      maximum: Qualité maximale
      medium: Qualité moyenne
      small_file: Petite taille de fichier
      very_high: Très haute qualité

    errors:
