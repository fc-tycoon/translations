  asr:
    heading: Dictée vocale
    copy: La dictée vocale capture l'audio de votre microphone et le transcrit localement sur votre machine. Choisissez ci-dessous un modèle vocal, une cible d'accélération et un mode de dictée.
    acceleration_label: Cible d'accélération
    model_label: Modèle vocal
    mode_label: Mode de dictée
    preview_interval_label: Intervalle de prévisualisation en direct
    recommendations_heading: Recommandations
    microphone_label: Microphone
    refresh_microphones: Actualiser les microphones
    runtime_heading: État du runtime
    runtime_copy: Le mode tamponné attend l'énoncé complet avant de décoder. Le mode streaming affiche du texte partiel pendant que vous parlez et effectue malgré tout une passe finale complète à l'arrêt.
    loading: Chargement des préférences ASR...

    runtime:
      backend_runtime: Runtime du backend
      kind: Type de runtime
      artifact: Artefact du runtime
      selected_model_artifact: Artefact du modèle sélectionné
      execution_backend: Backend d'exécution
      requested_target: Cible demandée
      compute_api: API de calcul
      device: Périphérique
      worker_threads: Threads de travail
      model_artifacts: Artefacts du modèle
      model_size: Taille du modèle installé
      streaming_output: Sortie en streaming

    preview:
      heading: Aperçu de l'intégration dans le champ
      copy: Cet aperçu utilise le même contrôle de dictée au niveau du champ que les saisies de texte. L'action du micro est directement intégrée dans le cadre de la zone de texte.
      placeholder: Saisissez ici ou capturez l'audio du microphone pour valider le transport ASR...
      browser_capture: Capture du navigateur
      last_state: Dernier état de dictée
      audio_duration: Durée audio
      encode_time: Temps d'encodage
      decode_time: Temps de décodage
      total_runtime: Temps d'exécution total
      text_tokens: Jetons de texte
      model_load: Chargement du modèle

    hints:
      choose_acceleration: Choisissez la cible de calcul à utiliser pour la transcription.
      choose_model: Choisissez le modèle vocal à utiliser pour la transcription.
      choose_mode: Choisissez comment l'audio capturé par le microphone doit être envoyé au backend.
      embedded_dll_only: Utilise uniquement le runtime DLL intégré.
      device_npu: Le mode Intel NPU utilise OpenVINO et cible le périphérique NPU sélectionné par le système. Le pont actuel déporte l'encodeur Whisper sur le NPU et conserve le travail du décodeur sur le CPU.
      device_non_cuda: La sélection explicite du GPU ne s'applique actuellement qu'à CUDA. Vulkan et HIP utilisent le GPU par défaut du runtime exposé par whisper.cpp.
      device_no_cuda_devices: Aucun périphérique GPU compatible CUDA n'est actuellement exposé par le runtime ASR.
      device_choose_cuda: Choisissez quel GPU CUDA détecté ASR doit utiliser. Ce sélecteur concerne uniquement l'ASR ; la génération de visages et les charges LLM restent configurées séparément.
      device_use_cuda: Utilise {name} pour l'ASR CUDA. Ce sélecteur n'affecte que la dictée vocale ; l'affectation GPU de la génération de visages et du LLM n'est pas synchronisée automatiquement.
      npu_notice: Le mode Intel NPU utilise OpenVINO et le périphérique NPU sélectionné par le système. Il n'existe pas encore de sélecteur par périphérique, et le travail du décodeur Whisper continue de s'exécuter sur le CPU dans le pont actuel.
      non_cuda_notice: Le pont Whisper actuel utilise le GPU par défaut du runtime pour Vulkan et HIP. La sélection explicite par périphérique n'est pour le moment prise en charge que pour CUDA.
      no_selectable_cuda: Le runtime intégré n'a signalé aucun périphérique CUDA sélectionnable. L'ASR utilisera le périphérique par défaut du runtime pour cette cible d'accélération.
      single_cuda_device: 'Un seul périphérique ASR compatible CUDA est actuellement exposé : {name}. Un sélecteur séparé est inutile.'
      multiple_cuda_devices: Plusieurs périphériques ASR compatibles CUDA sont disponibles. Choisissez quel GPU physique la dictée doit utiliser.

    status:
      cpu: CPU
      default_gpu: le GPU par défaut
      final_pass_only: Passe finale uniquement
      gpu_device: Périphérique GPU ASR
      host_cpu: CPU hôte
      missing: Manquant
      model_file_plural: '{count} fichiers de modèle'
      model_file_singular: '{count} fichier de modèle'
      native_c: native-c
      no_model_files: Aucun fichier de modèle détecté
      npu_device: Périphérique NPU ASR
      present: Présent
      ready: Prêt
      recommended_suffix: (Recommandé)
      streaming_enabled: Partiels en direct activés
      unavailable: Indisponible

    streaming:
      base: Un segment audio est transcrit toutes les {chunkMs} ms pendant que vous parlez.
      ultra_fast: Réactivité maximale. La transcription s'exécute presque en continu. Recommandé uniquement sur du matériel rapide avec un modèle Tiny ou Base. Attendez-vous à une forte charge CPU.
      fast: Très réactif. Fonctionne bien avec les modèles Tiny et Base. Convient aux dactylos rapides ou aux besoins de retour à faible latence.
      recommended: Bon compromis recommandé. Équilibre entre réactivité et coût CPU. Les mises à jour partielles paraissent naturelles à cet intervalle.
      standard: Standard. Mises à jour prévisibles sans activité CPU excessive. Un choix solide pour n'importe quelle taille de modèle.
      slow: Aperçu à faible fréquence. Moins de mises à jour par énoncé et une charge CPU plus basse. Le texte apparaît par blocs plus larges plutôt que mot à mot.

    recommendations:
      cpu_1: 'Inférence CPU : commencez par Tiny ou Tiny English. Base peut fonctionner sur des CPU plus puissants, mais Small est généralement mieux réservé à la dictée tamponnée.'
      cpu_2: 'Aperçu en direct sur CPU : testez-le d''abord. Si la frappe ou la réactivité de l''interface se dégrade, augmentez l''intervalle à 500-1000 ms avant d''incriminer la qualité du modèle.'
      cuda_1: CUDA est actuellement la meilleure voie pour un aperçu en direct à faible latence et pour exécuter des modèles Base ou Small sans rendre l'interface lente.
      cuda_2: Si vous avez plusieurs GPU NVIDIA, ne placez l'ASR sur la carte la plus légère que si la carte principale est déjà occupée par du travail LLM ou facegen.
      openvino_1: Le mode Intel NPU nécessite les fichiers IR d'encodeur OpenVINO correspondant à votre modèle Whisper sélectionné. Le simple modèle ggml ne suffit pas.
      openvino_2: OpenVINO NPU ne déporte actuellement que le travail de l'encodeur Whisper. Le gain le plus net concerne Base ou Small, pas forcément Tiny.
      other_gpu: Vulkan et HIP fonctionnent le mieux comme modes simples d'accélération GPU. Le pont actuel utilise le GPU par défaut du runtime plutôt qu'un sélecteur par périphérique pour ces backends.
      streaming_1: 'Aperçu en direct : commencez autour de 300-500 ms. Si vous voulez des partiels plus fluides, testez 200 ms, mais ne le conservez que si l''interface reste réactive sur votre machine.'
      streaming_2: Votre intervalle actuel est très agressif. Si l'aperçu se bloque ou si le champ se fige, utilisez un tampon plus long avant de changer la taille du modèle.
      buffered: Le mode tamponné reste l'option la plus sûre lorsque la précision finale compte davantage que le fait de voir le texte apparaître en cours de phrase.

