
# ══════════════════════════════════════════════════════════════════════
# 개성 템플릿
# ══════════════════════════════════════════════════════════════════════
personalities:
  pragmatic_winner:
    label: 실용주의적 승부사
    text: 트로피에 대한 끝없는 갈망을 지닌 현실주의자. 규율과 전술적 혁신을 바탕으로 팀을 구축한다고 믿는다.
  youth_developer:
    label: 유스 육성 전문가
    text: 장기적 성장을 중시하는 인내심 강한 멘토. 고가의 영입보다 젊은 재능을 키우는 것을 선호한다.
  defensive_mastermind:
    label: 수비 전략가
    text: 수비 조직에 집착하는 치밀한 조직자. 매 실점은 개인적인 실패로 여긴다.
  attacking_idealist:
    label: 공격적 이상주의자
    text: 표현력 넘치는 공격 축구를 요구한다. 1-0 승리보다 4-3 패배를 선택할 수 있다.
  old_school_disciplinarian:
    label: 구식 원칙주의자
    text: 완전한 헌신을 요구하는 완고한 전통주의자. 기준은 절대 협상 불가하다.
  media_darling:
    label: 미디어의 총아
    text: 스포트라이트 속에서 빛나는 카리스마 넘치는 사이드라인 인물. 기자회견을 무기로 활용한다.
  silent_operator:
    label: 침묵의 실행자
    text: 조용하고 차분하며 매우 사적인 인물. 결과로 말하며 드라마를 피한다.
  tactical_innovator:
    label: 전술 혁신가
    text: 포메이션과 시스템을 끊임없이 수정하는 탐구적 사고가. 항상 다음 우위를 찾아 나선다.
  assistant_loyal_lieutenant:
    label: 충성스러운 부관
    text: 감독의 메시지를 공개적으로 지키고 사적으로도 강하게 뒷받침하는 매우 충성스러운 보좌역이다. 라커룸이 감독과 같은 방향을 보도록 만들며 결코 권위를 흔들지 않는다.
  assistant_tactical_brain:
    label: 전술 브레인
    text: 큰 아이디어를 훈련 세부 계획, 상대 분석, 경기 중 깔끔한 수정으로 바꿔내는 날카로운 축구 두뇌다. 패턴을 빠르게 읽고 잡음이 아닌 쓸모 있는 답을 감독에게 제공한다.
  assistant_training_ground_general:
    label: 훈련장의 지휘관
    text: 구조, 강도, 집요한 점검으로 훈련장의 분위기를 만든다. 경기 당일만이 아니라 매일 높은 기준이 유지되도록 한다.
  assistant_player_whisperer:
    label: 선수 소통 전문가
    text: 선수들의 분위기를 일찍 읽고 어려운 대화도 차분한 권위로 처리한다. 선수들이 존중받는다고 느끼게 하면서도 코칭스태프의 기준은 분명히 지킨다.
  assistant_development_specialist:
    label: 성장 개발 전문가
    text: 개인 성장, 역할의 명확성, 장기적 향상에 집착한다. 유망주와 로테이션 자원에게 구체적인 다음 단계를 제시하는 데 특히 강하다.
  assistant_standards_enforcer:
    label: 기준 집행자
    text: 모든 루틴에서 시간 엄수, 프로 정신, 일관성을 요구한다. 성적이 흔들릴 때도 환경을 날카롭게 유지하며 안일함을 용납하기 어렵게 만든다.
  assistant_opposition_analyst:
    label: 상대 분석가
    text: 경기 영상, 보고서, 매치업 세부 사항에 몰두한다. 다음 상대를 어디서 압박하고, 어디를 보호하며, 어디를 공략할지 분명한 메모를 준비해 온다.
  assistant_calm_conduit:
    label: 침착한 연결고리
    text: 부진, 빡빡한 일정, 미디어 소음 속에서도 선수단과 스태프를 차분하게 유지하는 안정적인 소통가다. 위아래로 메시지를 전달하면서도 마찰을 만들지 않는다.
  assistant_culture_keeper:
    label: 문화 수호자
    text: 구단의 가치를 몸소 보여 주며 조직의 분위기를 지킨다. 신입 선수, 유소년, 주변 자원들이 기대 수준을 빠르게 이해하도록 돕는다.
