  facegen:
    heading: 얼굴 생성
    copy: 얼굴 생성은 전체 과정에서 하나의 공유 런타임을 사용합니다. 대기열과 우선순위는 자동으로 처리됩니다.
    backend_label: 추론 백엔드
    quality_label: 인물 JPEG 품질
    persist_heading: 초상화를 세이브에 저장
