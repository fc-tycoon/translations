multi_instance:
  window_title: 다른 인스턴스 감지
  heading: 다른 FC Tycoon 게임 또는 에디터 인스턴스가 이미 실행 중입니다.
  intro: 여러 인스턴스를 동시에 실행하면 동일한 설정 파일을 공유하고 동일한 데이터베이스 또는 저장 파일을 대상으로 할 수 있습니다. 변경 내용은 실행 중인 인스턴스 사이에 동기화되지 않습니다.
  instructions: 다른 인스턴스를 계속 실행하기 전에 아래 각 항목을 확인하십시오.
  config_path_label: 공유 구성 디렉터리
  data_path_label: 관련 데이터베이스 또는 저장 경로
  path_unavailable: 사용할 수 없음
  preferences_ack: 환경설정 및 구성 변경 내용은 다른 실행 중 인스턴스가 다시 로드하거나 다시 시작할 때까지 그 인스턴스에 표시되지 않을 수 있음을 이해합니다.
  database_ack: 데이터베이스 또는 저장 변경 내용이 다른 인스턴스의 작업을 덮어쓸 수 있으며, 그 변경 내용은 상대 인스턴스가 데이터베이스를 다시 로드하거나 다시 시작할 때까지 표시되지 않을 수 있음을 이해합니다.
  final_ack: 이 약관에 동의하며 다른 인스턴스 실행을 계속하겠습니다.
  continue: 계속
  exit: 종료