    runtime_copy: Tryb buforowany czeka na całą wypowiedź przed dekodowaniem. Tryb strumieniowy pokazuje częściowy tekst podczas mówienia, a po zatrzymaniu nadal wykonuje końcowy pełny przebieg.
    loading: Ładowanie preferencji ASR...

