      model_size: Rozmiar zainstalowanego modelu
      streaming_output: Wyjście strumieniowe

    preview:
      heading: Podgląd integracji z polem
      copy: Ten podgląd używa tego samego sterowania dyktowaniem na poziomie pola, co zwykłe pola tekstowe. Akcja mikrofonu jest osadzona bezpośrednio w ramce pola tekstowego.
      placeholder: Pisz tutaj lub przechwyć dźwięk z mikrofonu, aby zweryfikować transport ASR...
      browser_capture: Przechwytywanie w przeglądarce
      last_state: Ostatni stan dyktowania
      audio_duration: Czas trwania dźwięku
      encode_time: Czas kodowania
      decode_time: Czas dekodowania
      total_runtime: Łączny czas wykonania
      text_tokens: Tokeny tekstu
      model_load: Wczytanie modelu

    hints:
      choose_acceleration: Wybierz cel obliczeniowy używany do transkrypcji.
      choose_model: Wybierz model głosowy używany do transkrypcji.
      choose_mode: Wybierz sposób wysyłania przechwyconego dźwięku z mikrofonu do backendu.
      embedded_dll_only: Używa wyłącznie osadzonego środowiska DLL.
      device_npu: Tryb Intel NPU używa OpenVINO i kieruje pracę na urządzenie NPU wybrane przez system. Bieżący mostek przenosi enkoder Whisper na NPU, a pracę dekodera pozostawia na CPU.
      device_non_cuda: Jawny wybór urządzenia GPU dotyczy obecnie tylko CUDA. Vulkan i HIP używają domyślnego urządzenia GPU środowiska wykonawczego udostępnionego przez whisper.cpp.
      device_no_cuda_devices: Środowisko ASR nie udostępnia obecnie żadnych urządzeń GPU zgodnych z CUDA.
      device_choose_cuda: Wybierz wykrytą kartę CUDA, której ASR ma używać. Ten wybór dotyczy tylko ASR; generowanie twarzy i obciążenia LLM pozostają skonfigurowane osobno.
      device_use_cuda: Używa {name} do zadań ASR z CUDA. Ten wybór wpływa tylko na dyktowanie głosowe; przypisanie GPU dla generowania twarzy i LLM nie jest synchronizowane automatycznie.
      npu_notice: Tryb Intel NPU używa OpenVINO i urządzenia NPU wybranego przez system. Nie ma jeszcze wyboru konkretnego urządzenia, a praca dekodera Whisper nadal odbywa się na CPU w bieżącym mostku.
      non_cuda_notice: Obecny mostek Whisper używa domyślnego GPU środowiska wykonawczego dla Vulkan i HIP. Jawny wybór urządzenia jest na razie obsługiwany tylko dla CUDA.
      no_selectable_cuda: Osadzone środowisko wykonawcze nie zgłosiło żadnych wybieralnych urządzeń CUDA. ASR użyje dla tego celu akceleracji domyślnego urządzenia środowiska.
      single_cuda_device: 'Obecnie dostępne jest tylko jedno urządzenie ASR zgodne z CUDA: {name}. Osobny wybierak nie jest potrzebny.'
      multiple_cuda_devices: Dostępnych jest wiele urządzeń ASR obsługujących CUDA. Wybierz, której fizycznej karty GPU ma używać dyktowanie.

    status:
      cpu: CPU
      default_gpu: domyślny GPU
      final_pass_only: Tylko przebieg końcowy
      gpu_device: Urządzenie GPU ASR
      host_cpu: CPU hosta
      missing: Brak
      model_file_plural: '{count} plików modelu'
      model_file_singular: '{count} plik modelu'
      native_c: native-c
      no_model_files: Nie wykryto plików modelu
      npu_device: Urządzenie NPU ASR
      present: Obecne
      ready: Gotowe
      recommended_suffix: (Zalecane)
      streaming_enabled: Włączono częściowe wyniki na żywo
      unavailable: Niedostępne

    streaming:
      base: Podczas mówienia co {chunkMs} ms transkrybowany jest fragment dźwięku.
      ultra_fast: Maksymalna responsywność. Transkrypcja działa niemal bez przerwy. Zalecane tylko na szybkim sprzęcie z modelem Tiny albo Base. Spodziewaj się wysokiego obciążenia CPU.
      fast: Bardzo responsywne. Dobrze działa z modelami Tiny i Base. Odpowiednie dla szybkiego pisania lub gdy ważny jest niski czas reakcji.
      recommended: Zalecany złoty środek. Dobra równowaga między responsywnością a kosztem CPU. Częściowe aktualizacje przy tym interwale wydają się naturalne.
      standard: Standard. Przewidywalne aktualizacje bez nadmiernej aktywności CPU. Solidny wybór dla każdego rozmiaru modelu.
      slow: Podgląd o niskiej częstotliwości. Mniej aktualizacji na wypowiedź i mniejsze obciążenie CPU. Tekst pojawia się większymi blokami zamiast słowo po słowie.

    recommendations:
      cpu_1: Wnioskowanie na CPU: zacznij od Tiny albo Tiny English. Base może działać na mocniejszych CPU, ale Small zwykle lepiej zostawić do dyktowania buforowanego.
      cpu_2: Podgląd na żywo na CPU najpierw przetestuj. Jeśli pisanie lub responsywność interfejsu spada, zwiększ interwał do 500-1000 ms, zanim obwinisz jakość modelu.
      cuda_1: CUDA to obecnie najlepsza ścieżka dla podglądu na żywo z niskim opóźnieniem i uruchamiania modeli Base albo Small bez spowalniania interfejsu.
      cuda_2: Jeśli masz wiele GPU NVIDIA, trzymaj ASR na słabszej karcie tylko wtedy, gdy główna karta jest zajęta pracą LLM lub facegen.
      openvino_1: Tryb Intel NPU wymaga dopasowanych plików IR enkodera OpenVINO dla wybranego modelu Whisper. Sam zwykły model ggml nie wystarczy.
      openvino_2: OpenVINO NPU obecnie odciąża tylko enkoder Whisper. Największy zysk zwykle widać przy Base lub Small, niekoniecznie przy Tiny.
      other_gpu: Vulkan i HIP najlepiej traktować jako proste tryby akceleracji GPU. Obecny mostek używa dla tych backendów domyślnego GPU środowiska zamiast wybieraka urządzeń.
      streaming_1: Podgląd na żywo: zacznij od około 300-500 ms. Jeśli chcesz płynniejszych częściowych wyników, przetestuj 200 ms, ale zostaw to tylko wtedy, gdy interfejs na twojej maszynie nadal reaguje.
      streaming_2: Obecny interwał jest bardzo agresywny. Jeśli podgląd się zawiesza lub pole zamarza, użyj dłuższego bufora, zanim zmienisz rozmiar modelu.
      buffered: Tryb buforowany nadal jest najbezpieczniejszym wyborem, gdy bardziej zależy ci na końcowej dokładności niż na tym, by tekst pojawiał się w połowie zdania.

