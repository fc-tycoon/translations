  asr:
    heading: Dyktowanie głosowe
    copy: Dyktowanie głosowe przechwytuje dźwięk z mikrofonu i lokalnie przepisuje go na tekst. Poniżej wybierz model głosowy, cel akceleracji i tryb dyktowania.
